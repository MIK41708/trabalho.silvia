<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engenharia de Manutenção | Responsivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #b71c1c;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #6c757d;
            --border: #dee2e6;
        }

        /* Ajuste para o footer ficar sempre no fim */
        html, body {
            height: 100%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex;
            flex-direction: column; /* Organiza em coluna */
            line-height: 1.6;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: #fff;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        header p { font-size: clamp(0.9rem, 2vw, 1.1rem); color: var(--text-dim); }

        .container { 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
            flex: 1; /* Faz o container ocupar todo o espaço restante empurrando o footer */
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 20px;
        }

        @media (min-width: 768px) {
            .main-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .main-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .icon-box {
            width: 45px; height: 45px;
            background: rgba(211, 47, 47, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; color: var(--primary); font-size: 1.2rem;
        }

        h2 { 
            font-size: 1.15rem; 
            margin-bottom: 20px; 
            color: var(--secondary);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        input, select, textarea {
            width: 100%;
            background: #fdfdfd;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px; 
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:active { transform: scale(0.98); }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .kpi-box {
            background: #fff5f5;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(211, 47, 47, 0.05);
        }

        .kpi-box span { display: block; font-size: 0.6rem; color: var(--text-dim); font-weight: 700; }
        .kpi-box strong { font-size: 0.95rem; color: var(--primary); }

        .lista-ativos {
            max-height: 400px;
            overflow-y: auto;
        }

        .ativo-item {
            background: #fff;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .badge-critico { 
            background: var(--primary); 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.65rem;
            font-weight: 800;
        }

        /* --- Footer Atualizado (Menor e embaixo) --- */
        footer { 
            text-align: center; 
            padding: 15px; /* Reduzido de 20px */
            color: var(--text-dim); 
            font-size: 0.75rem; /* Fonte reduzida para minimalismo */
            border-top: 1px solid var(--border);
            background: #fff;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Metalúrgia BGS</h1>
        <p>Engenharia de Confiabilidade</p>
    </header>

    <div class="container">
        <div class="main-grid">
            
            <section class="card">
                <div class="icon-box"><i class="fas fa-plus"></i></div>
                <h2>Novo Ativo</h2>
                <input type="text" id="equipamento" placeholder="Nome do Equipamento">
                <select id="criticidade">
                    <option value="">Criticidade</option>
                    <option value="A">A (Crítico)</option>
                    <option value="B">B (Médio)</option>
                    <option value="C">C (Baixo)</option>
                </select>
                <textarea id="procedimento" rows="3" placeholder="Instruções Técnicas"></textarea>
                <button onclick="cadastrarAtivo()">Salvar Ativo</button>
            </section>

            <section class="card">
                <div class="icon-box"><i class="fas fa-chart-bar"></i></div>
                <h2>Indicadores (KPI)</h2>
                <div class="kpi-grid">
                    <div class="kpi-box"><span>MTBF</span><strong id="mtbf">0h</strong></div>
                    <div class="kpi-box"><span>MTTR</span><strong id="mttr">0h</strong></div>
                    <div class="kpi-box"><span>DISP.</span><strong id="disp">0%</strong></div>
                </div>
                <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid #eee;">
                    <p style="font-size: 0.75rem; font-weight: bold; margin-bottom: 8px;">Downtime (Horas):</p>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="tempoFalha" placeholder="0" style="margin:0">
                        <button style="width: 50px;" onclick="atualizarKPIs()"><i class="fas fa-sync"></i></button>
                    </div>
                </div>
            </section>

            <section class="card">
                <div class="icon-box"><i class="fas fa-database"></i></div>
                <h2>Inventário Técnico</h2>
                <div id="listaAtivos" class="lista-ativos">
                    <p style="text-align: center; color: var(--text-dim); font-size: 0.8rem;">Nenhum item.</p>
                </div>
            </section>

        </div>
    </div>

    <footer>
        <p>Metalúrgia BGS - Foco no trabalho duro, e o resto Deus proverá!</p>
    </footer>

    <script>
        let ativos = [];

        function cadastrarAtivo() {
            const equip = document.getElementById("equipamento").value;
            const crit = document.getElementById("criticidade").value;
            const proc = document.getElementById("procedimento").value;

            if(!equip || !crit) {
                alert("Preencha os campos obrigatórios.");
                return;
            }

            ativos.push({ id: Date.now(), equip, crit, proc });
            renderizarAtivos();
            
            document.getElementById("equipamento").value = "";
            document.getElementById("criticidade").value = "";
            document.getElementById("procedimento").value = "";
        }

        function renderizarAtivos() {
            const lista = document.getElementById("listaAtivos");
            lista.innerHTML = "";

            if (ativos.length === 0) {
                lista.innerHTML = '<p style="text-align: center; color: var(--text-dim); font-size: 0.8rem;">Nenhum item.</p>';
                return;
            }

            ativos.forEach(ativo => {
                const div = document.createElement("div");
                div.className = "ativo-item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${ativo.equip}</strong> 
                        ${ativo.crit === 'A' ? '<span class="badge-critico">CRÍTICO</span>' : '<small>Classe '+ativo.crit+'</small>'}
                    </div>
                    <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">${ativo.proc}</p>
                `;
                lista.appendChild(div);
            });
        }

        function atualizarKPIs() {
            const parado = parseFloat(document.getElementById("tempoFalha").value) || 0;
            const total = 720; 
            if(parado > 0) {
                let mtbf = total - parado;
                let disp = (mtbf / total) * 100;
                document.getElementById("mtbf").innerText = mtbf + "h";
                document.getElementById("mttr").innerText = parado + "h";
                document.getElementById("disp").innerText = disp.toFixed(1) + "%";
            }
        }
    </script>
</body>
</html>
